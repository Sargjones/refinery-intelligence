name: Update index.html

on:
  schedule:
    - cron: '0 12 * * *'   # daily at noon UTC
  push:
    branches: [main]        # also triggers on every push
  workflow_dispatch:        # allows manual "Run workflow" button

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: No-op (static site, dynamic dates are client-side)
        run: echo "Site deployed. Day counter and dates are calculated in-browser via new Date()."
